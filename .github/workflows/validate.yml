name: Validate TobyMusic Platform

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply student active-status toggle
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          students_path = Path('src/components/admin/StudentsManagement.tsx')
          text = students_path.read_text(encoding='utf-8')
          text = text.replace(', UserX, DoorOpen', ', DoorOpen')

          handler_pattern = re.compile(
              r"  const handleMarkLeft = \(student: import\('@/lib/types'\)\.Student\) => \{.*?\n  \};",
              re.S,
          )
          handler_replacement = '''  const handleToggleActive = (student: Student) => {
    if (student.isActive === false) {
      updateStudent(student.id, {
        isActive: true,
        leftDate: undefined,
        leftReason: undefined
      });
      refreshStudents();
      toast({
        title: 'התלמידה חזרה לפעילות',
        description: `${student.firstName} ${student.lastName} מסומנת שוב כתלמידה פעילה`
      });
      return;
    }

    const reason = window.prompt(
      `סיבת עזיבה של ${student.firstName} ${student.lastName} (אפשרי לרשום "סיום שנה" / "עברה" / "הפסקה זמנית"):`
    );
    if (reason === null) return;

    updateStudent(student.id, {
      isActive: false,
      leftDate: new Date().toISOString().split('T')[0],
      leftReason: reason.trim() || 'לא צוין'
    });
    refreshStudents();
    toast({
      title: 'התלמידה סומנה כלא פעילה',
      description: `${student.firstName} לא תקבל עוד דוחות ועדכונים המיועדים לתלמידות פעילות`
    });
  };'''
          if 'const handleToggleActive' not in text:
              text, count = handler_pattern.subn(handler_replacement, text, count=1)
              if count != 1:
                  raise SystemExit('Could not replace handleMarkLeft')

          old_grid_button = '''                        <Button
                          size="sm"
                          variant="outline"
                          className="border-yellow-600 text-yellow-600 hover:bg-yellow-50"
                          onClick={() => handleMarkLeft(student)}
                          title="סמן כ-עזבה (לא ימחק נתונים)"
                        >
                          <DoorOpen className="h-3 w-3" />
                        </Button>'''
          toggle_button = '''                        <Button
                          size="sm"
                          variant="outline"
                          className={student.isActive === false
                            ? "border-slate-400 bg-slate-200 text-slate-600 hover:bg-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600"
                            : "border-yellow-600 text-yellow-600 hover:bg-yellow-50 dark:hover:bg-yellow-950/30"
                          }
                          onClick={() => handleToggleActive(student)}
                          title={student.isActive === false
                            ? "החזירי את התלמידה לפעילות"
                            : "סמני את התלמידה כעזבה"
                          }
                          aria-label={student.isActive === false
                            ? "החזירי את התלמידה לפעילות"
                            : "סמני את התלמידה כעזבה"
                          }
                        >
                          <DoorOpen className={student.isActive === false ? "h-3 w-3 opacity-60" : "h-3 w-3"} />
                        </Button>'''
          if old_grid_button in text:
              text = text.replace(old_grid_button, toggle_button, 1)

          table_anchor = '''                          <Button
                            size="sm"
                            variant="outline"
                            onClick={() => handleEditStudent(student)}
                          >
                            <Edit className="h-3 w-3" />
                          </Button>
                          <Button
                            size="sm"
                            variant="destructive"'''
          table_replacement = '''                          <Button
                            size="sm"
                            variant="outline"
                            onClick={() => handleEditStudent(student)}
                          >
                            <Edit className="h-3 w-3" />
                          </Button>
                          <Button
                            size="sm"
                            variant="outline"
                            className={student.isActive === false
                              ? "border-slate-400 bg-slate-200 text-slate-600 hover:bg-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600"
                              : "border-yellow-600 text-yellow-600 hover:bg-yellow-50 dark:hover:bg-yellow-950/30"
                            }
                            onClick={() => handleToggleActive(student)}
                            title={student.isActive === false
                              ? "החזירי את התלמידה לפעילות"
                              : "סמני את התלמידה כעזבה"
                            }
                            aria-label={student.isActive === false
                              ? "החזירי את התלמידה לפעילות"
                              : "סמני את התלמידה כעזבה"
                            }
                          >
                            <DoorOpen className={student.isActive === false ? "h-3 w-3 opacity-60" : "h-3 w-3"} />
                          </Button>
                          <Button
                            size="sm"
                            variant="destructive"'''
          if table_anchor in text:
              text = text.replace(table_anchor, table_replacement, 1)

          required = [
              'const handleToggleActive = (student: Student)',
              'onClick={() => handleToggleActive(student)}',
              'bg-slate-200 text-slate-600',
              'החזירי את התלמידה לפעילות',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'Missing active toggle changes: {missing}')
          students_path.write_text(text, encoding='utf-8')

          main_path = Path('src/main.tsx')
          main_text = main_path.read_text(encoding='utf-8')
          main_text = main_text.replace(
              'import InactiveStudentStatusDecorator from "./components/admin/InactiveStudentStatusDecorator";\n',
              '',
          )
          main_text = main_text.replace('        <InactiveStudentStatusDecorator />\n', '')
          main_path.write_text(main_text, encoding='utf-8')

          decorator_path = Path('src/components/admin/InactiveStudentStatusDecorator.tsx')
          if decorator_path.exists():
              decorator_path.unlink()
          PY

      - name: Build and record result
        run: |
          set +e
          npm ci > /tmp/npm-ci.log 2>&1
          INSTALL_STATUS=$?
          if [ "$INSTALL_STATUS" -eq 0 ]; then
            npm run build > /tmp/npm-build.log 2>&1
            BUILD_STATUS=$?
          else
            BUILD_STATUS=99
          fi
          python3 - "$INSTALL_STATUS" "$BUILD_STATUS" <<'PY'
          import json, sys
          from datetime import datetime, timezone
          from pathlib import Path
          install_status = int(sys.argv[1])
          build_status = int(sys.argv[2])
          def tail(path, limit=5000):
              try:
                  text = Path(path).read_text(encoding='utf-8', errors='replace')
                  return text[-limit:]
              except Exception:
                  return ''
          report = {
              'generatedAt': datetime.now(timezone.utc).isoformat(),
              'installPassed': install_status == 0,
              'buildPassed': build_status == 0,
              'installExitCode': install_status,
              'buildExitCode': build_status,
              'installLogTail': tail('/tmp/npm-ci.log'),
              'buildLogTail': tail('/tmp/npm-build.log'),
          }
          Path('diagnostics').mkdir(exist_ok=True)
          Path('diagnostics/platform-build.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A src/components/admin/StudentsManagement.tsx src/components/admin/InactiveStudentStatusDecorator.tsx src/main.tsx diagnostics/platform-build.json
          git commit -m 'Add reversible inactive-student toggle [skip ci]'
          git pull --rebase origin main
          git push
          if [ "$INSTALL_STATUS" -ne 0 ] || [ "$BUILD_STATUS" -ne 0 ]; then
            echo 'Platform validation failed.'
            exit 1
          fi
