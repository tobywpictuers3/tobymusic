name: Toggle Student Active Status

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-inactive-student-visual-status.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace departure marker with active-status toggle
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          students_path = Path('src/components/admin/StudentsManagement.tsx')
          text = students_path.read_text(encoding='utf-8')

          # The previous outside decorator is no longer needed.
          text = text.replace(', UserX, DoorOpen', ', DoorOpen')

          handler_pattern = re.compile(
              r"  const handleMarkLeft = \(student: import\('@/lib/types'\)\.Student\) => \{.*?\n  \};",
              re.S,
          )
          handler_replacement = '''  const handleToggleActive = (student: Student) => {
    if (student.isActive === false) {
      updateStudent(student.id, {
        isActive: true,
        leftDate: undefined,
        leftReason: undefined
      });
      refreshStudents();
      toast({
        title: 'התלמידה חזרה לפעילות',
        description: `${student.firstName} ${student.lastName} מסומנת שוב כתלמידה פעילה`
      });
      return;
    }

    const reason = window.prompt(
      `סיבת עזיבה של ${student.firstName} ${student.lastName} (אפשרי לרשום "סיום שנה" / "עברה" / "הפסקה זמנית"):`
    );
    if (reason === null) return;

    updateStudent(student.id, {
      isActive: false,
      leftDate: new Date().toISOString().split('T')[0],
      leftReason: reason.trim() || 'לא צוין'
    });
    refreshStudents();
    toast({
      title: 'התלמידה סומנה כלא פעילה',
      description: `${student.firstName} לא תקבל עוד דוחות ועדכונים המיועדים לתלמידות פעילות`
    });
  };'''
          text, handler_count = handler_pattern.subn(handler_replacement, text, count=1)
          if handler_count != 1 and 'const handleToggleActive' not in text:
              raise SystemExit('Could not replace handleMarkLeft')

          old_grid_button = '''                        <Button
                          size="sm"
                          variant="outline"
                          className="border-yellow-600 text-yellow-600 hover:bg-yellow-50"
                          onClick={() => handleMarkLeft(student)}
                          title="סמן כ-עזבה (לא ימחק נתונים)"
                        >
                          <DoorOpen className="h-3 w-3" />
                        </Button>'''
          new_toggle_button = '''                        <Button
                          size="sm"
                          variant="outline"
                          className={student.isActive === false
                            ? "border-slate-400 bg-slate-200 text-slate-600 hover:bg-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600"
                            : "border-yellow-600 text-yellow-600 hover:bg-yellow-50 dark:hover:bg-yellow-950/30"
                          }
                          onClick={() => handleToggleActive(student)}
                          title={student.isActive === false
                            ? "החזירי את התלמידה לפעילות"
                            : "סמני את התלמידה כעזבה"
                          }
                          aria-label={student.isActive === false
                            ? "החזירי את התלמידה לפעילות"
                            : "סמני את התלמידה כעזבה"
                          }
                        >
                          <DoorOpen className={student.isActive === false ? "h-3 w-3 opacity-60" : "h-3 w-3"} />
                        </Button>'''
          if old_grid_button in text:
              text = text.replace(old_grid_button, new_toggle_button, 1)
          elif 'onClick={() => handleToggleActive(student)}' not in text:
              raise SystemExit('Could not replace grid departure button')

          table_edit_button = '''                          <Button
                            size="sm"
                            variant="outline"
                            onClick={() => handleEditStudent(student)}
                          >
                            <Edit className="h-3 w-3" />
                          </Button>
                          <Button
                            size="sm"
                            variant="destructive"'''
          table_edit_with_toggle = '''                          <Button
                            size="sm"
                            variant="outline"
                            onClick={() => handleEditStudent(student)}
                          >
                            <Edit className="h-3 w-3" />
                          </Button>
                          <Button
                            size="sm"
                            variant="outline"
                            className={student.isActive === false
                              ? "border-slate-400 bg-slate-200 text-slate-600 hover:bg-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600"
                              : "border-yellow-600 text-yellow-600 hover:bg-yellow-50 dark:hover:bg-yellow-950/30"
                            }
                            onClick={() => handleToggleActive(student)}
                            title={student.isActive === false
                              ? "החזירי את התלמידה לפעילות"
                              : "סמני את התלמידה כעזבה"
                            }
                            aria-label={student.isActive === false
                              ? "החזירי את התלמידה לפעילות"
                              : "סמני את התלמידה כעזבה"
                            }
                          >
                            <DoorOpen className={student.isActive === false ? "h-3 w-3 opacity-60" : "h-3 w-3"} />
                          </Button>
                          <Button
                            size="sm"
                            variant="destructive"'''
          if table_edit_button in text:
              text = text.replace(table_edit_button, table_edit_with_toggle, 1)

          required = [
              'const handleToggleActive = (student: Student)',
              'bg-slate-200 text-slate-600',
              'החזירי את התלמידה לפעילות',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'Missing active toggle changes: {missing}')

          students_path.write_text(text, encoding='utf-8')

          main_path = Path('src/main.tsx')
          main_text = main_path.read_text(encoding='utf-8')
          main_text = main_text.replace(
              'import InactiveStudentStatusDecorator from "./components/admin/InactiveStudentStatusDecorator";\n',
              '',
          )
          main_text = main_text.replace('        <InactiveStudentStatusDecorator />\n', '')
          main_path.write_text(main_text, encoding='utf-8')

          decorator_path = Path('src/components/admin/InactiveStudentStatusDecorator.tsx')
          if decorator_path.exists():
              decorator_path.unlink()
          PY

      - name: Commit toggle behavior
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A src/components/admin/StudentsManagement.tsx src/components/admin/InactiveStudentStatusDecorator.tsx src/main.tsx
          if git diff --cached --quiet; then
            echo 'Student active-state toggle already present'
          else
            git commit -m 'Make departure icon toggle student active status [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build application
        run: |
          npm install --no-audit --no-fund
          npm run build
