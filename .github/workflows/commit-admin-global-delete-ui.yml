name: Commit Admin Global Delete UI

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/commit-admin-global-delete-ui.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch and report
        run: |
          python3 - <<'PY'
          import json
          import traceback
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path('src/components/admin/MessagingTab.tsx')
          text = path.read_text(encoding='utf-8')
          before = text
          report = {
              'generatedAt': datetime.now(timezone.utc).isoformat(),
              'before': {
                  'importAnchor': text.count('import { workerApi } from "@/lib/workerApi";'),
                  'stateAnchor': text.count('const [isSyncingGmail, setIsSyncingGmail]'),
                  'emptyTrashAnchor': text.count('const handleEmptyTrash = async'),
                  'hardDeleteCalls': text.count('onHardDelete={() => handleHardDelete(selectedMessage.id)}'),
                  'propsAnchor': text.count('onHardDelete: () => void;'),
                  'destructureAnchor': text.count('  onHardDelete,'),
                  'actionsAnchor': text.count('{/* Actions */}'),
              },
              'success': False,
              'error': None,
          }

          try:
              if 'deleteMessageGloballyAsAdmin' not in text:
                  text = text.replace(
                      'import { workerApi } from "@/lib/workerApi";',
                      'import { workerApi } from "@/lib/workerApi";\nimport { deleteMessageGloballyAsAdmin } from "@/lib/adminGlobalDelete";',
                      1,
                  )
              if 'isGlobalDeleting, setIsGlobalDeleting' not in text:
                  text = text.replace(
                      '  const [isSyncingGmail, setIsSyncingGmail] = useState(false);',
                      '  const [isSyncingGmail, setIsSyncingGmail] = useState(false);\n  const [isGlobalDeleting, setIsGlobalDeleting] = useState(false);',
                      1,
                  )
              if 'const handleGlobalDelete = async' not in text:
                  anchor = '  const handleEmptyTrash = async () => {'
                  if anchor not in text:
                      raise RuntimeError('empty trash anchor missing')
                  handler = '''  const handleGlobalDelete = async (message: Message) => {
    const confirmed = window.confirm(
      `למחוק את ההודעה "${message.subject || '(ללא נושא)'}" מכל תיקיות הפלטפורמה ומימות המשיח?\\n\\n` +
      'הפעולה מערכתית, תיצור סימון מחיקה קבוע ולא ניתנת לביטול.'
    );
    if (!confirmed) return;
    const managerCode = window.prompt('הקישי שוב את קוד המנהל לאישור המחיקה המערכתית:');
    if (!managerCode?.trim()) return;
    setIsGlobalDeleting(true);
    try {
      const result = await deleteMessageGloballyAsAdmin(message.id, managerCode.trim());
      await hardDeleteMessage(message.id);
      loadData();
      setSelectedMessage(null);
      if (isMobile) setMobileView('list');
      const externalNote = message.emailSent ? ' מייל שכבר הגיע לתיבה פרטית של תלמידה אינו ניתן למשיכה מרחוק.' : '';
      const yemotNote = result.removedFromYemotPlayback ? ' ההודעה הוסרה גם מרשימת ההשמעה בימות.' : '';
      toast.success(`ההודעה נמחקה מכל הפלטפורמה.${yemotNote}${externalNote}`);
    } catch (error) {
      console.error('Global message delete failed:', error);
      toast.error(error instanceof Error ? error.message : 'המחיקה המערכתית נכשלה');
    } finally {
      setIsGlobalDeleting(false);
    }
  };

'''
                  text = text.replace(anchor, handler + anchor, 1)

              for old, new in [
                  (
                      '                  onHardDelete={() => handleHardDelete(selectedMessage.id)}\n                  onMarkAsUnread={() => handleMarkAsUnread(selectedMessage.id)}',
                      '                  onHardDelete={() => handleHardDelete(selectedMessage.id)}\n                  onGlobalDelete={() => handleGlobalDelete(selectedMessage)}\n                  isGlobalDeleting={isGlobalDeleting}\n                  onMarkAsUnread={() => handleMarkAsUnread(selectedMessage.id)}',
                  ),
                  (
                      '                onHardDelete={() => handleHardDelete(selectedMessage.id)}\n                onMarkAsUnread={() => handleMarkAsUnread(selectedMessage.id)}',
                      '                onHardDelete={() => handleHardDelete(selectedMessage.id)}\n                onGlobalDelete={() => handleGlobalDelete(selectedMessage)}\n                isGlobalDeleting={isGlobalDeleting}\n                onMarkAsUnread={() => handleMarkAsUnread(selectedMessage.id)}',
                  ),
              ]:
                  if old in text:
                      text = text.replace(old, new)

              if '  onGlobalDelete: () => void;' not in text:
                  old = '  onHardDelete: () => void;\n  onMarkAsUnread: () => void;'
                  if old not in text:
                      raise RuntimeError('MessageView props anchor missing')
                  text = text.replace(old, '  onHardDelete: () => void;\n  onGlobalDelete: () => void;\n  isGlobalDeleting: boolean;\n  onMarkAsUnread: () => void;', 1)

              if '  onGlobalDelete,\n  isGlobalDeleting,' not in text:
                  old = '  onHardDelete,\n  onMarkAsUnread,'
                  if old not in text:
                      raise RuntimeError('MessageView destructure anchor missing')
                  text = text.replace(old, '  onHardDelete,\n  onGlobalDelete,\n  isGlobalDeleting,\n  onMarkAsUnread,', 1)

              if 'מחק מכל המערכת' not in text:
                  anchor = '''      {/* Actions */}
      <div className="flex flex-wrap gap-2 pt-4 border-t">
        <Button variant="outline" size="sm" onClick={onReply}>'''
                  if anchor not in text:
                      raise RuntimeError('message actions anchor missing')
                  replacement = '''      {/* Actions */}
      <div className="flex flex-wrap gap-2 pt-4 border-t">
        <Button variant="destructive" size="sm" onClick={onGlobalDelete} disabled={isGlobalDeleting} title="מחיקה מערכתית מכל תיקיות הדואר ומימות המשיח">
          <Trash2 className="w-4 h-4 mr-2" />
          {isGlobalDeleting ? 'מוחק מכל המערכת...' : 'מחק מכל המערכת'}
        </Button>
        <Button variant="outline" size="sm" onClick={onReply}>'''
                  text = text.replace(anchor, replacement, 1)

              required = ['deleteMessageGloballyAsAdmin', 'const handleGlobalDelete = async', 'onGlobalDelete: () => void;', 'isGlobalDeleting: boolean;', 'מחק מכל המערכת']
              missing = [item for item in required if item not in text]
              if missing:
                  raise RuntimeError(f'patch incomplete: {missing}')
              path.write_text(text, encoding='utf-8')
              report['success'] = True
          except Exception as exc:
              report['error'] = f'{type(exc).__name__}: {exc}'
              report['traceback'] = traceback.format_exc()

          report['changed'] = text != before and path.read_text(encoding='utf-8') != before
          report['after'] = {
              'globalDeleteImport': text.count('deleteMessageGloballyAsAdmin'),
              'globalDeleteHandler': text.count('const handleGlobalDelete = async'),
              'globalDeleteCalls': text.count('onGlobalDelete={() => handleGlobalDelete(selectedMessage)}'),
              'globalDeleteProp': text.count('onGlobalDelete: () => void;'),
              'buttonText': text.count('מחק מכל המערכת'),
          }
          Path('diagnostics').mkdir(exist_ok=True)
          Path('diagnostics/admin-global-delete-ui-patch.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Commit component and report
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/components/admin/MessagingTab.tsx diagnostics/admin-global-delete-ui-patch.json
          git commit -m 'Apply admin global message deletion UI [skip ci]' || true
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            git rebase --abort || true
            sleep $((attempt * 5))
          done
          exit 1
